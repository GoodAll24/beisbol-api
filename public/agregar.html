<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agregar Jugador - Gestión de Béisbol</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div class="container">
    <h1>Gestión de Jugadores de Béisbol</h1>
    
    <nav class="nav-menu">
      <a href="/">Inicio</a>
      <a href="listar.html">Ver Lista</a>
    </nav>
    
    <div class="form-section">
      <h2 id="formTitle">Agregar Jugador</h2>
      <form id="jugadorForm">
        <input type="hidden" id="jugadorId">
        <div class="form-group">
          <label for="nombre">Nombre:</label>
          <input type="text" id="nombre" required>
        </div>
        <div class="form-group">
          <label for="avg">AVG (Promedio):</label>
          <input type="number" id="avg" step="0.001" min="0" max="1" required>
        </div>
        <div class="form-group">
          <label for="hr">HR (Home Runs):</label>
          <input type="number" id="hr" min="0" required>
        </div>
        <div class="form-group">
          <label for="rbi">RBI (Carreras Empujadas):</label>
          <input type="number" id="rbi" min="0" required>
        </div>
        <div class="form-group checkbox-group">
          <label for="activo">
            <input type="checkbox" id="activo" checked>
            Jugador Activo
          </label>
        </div>
        <div class="form-buttons">
          <button type="submit" id="submitBtn" class="btn-primary">Agregar</button>
          <button type="button" id="cancelBtn" class="btn-secondary" style="display: none;">Cancelar</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/app.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    
    if (params.has('id')) {
      document.getElementById('jugadorId').value = params.get('id');
      document.getElementById('nombre').value = params.get('nombre');
      document.getElementById('avg').value = params.get('avg');
      document.getElementById('hr').value = params.get('hr');
      document.getElementById('rbi').value = params.get('rbi');
      document.getElementById('activo').checked = params.get('activo') === 'true';
      
      document.getElementById('formTitle').textContent = 'Editar Jugador';
      document.getElementById('submitBtn').textContent = 'Actualizar';
      document.getElementById('cancelBtn').style.display = 'inline-block';
    }
  </script>
</body>
</html>
